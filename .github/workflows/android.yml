name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Rename APK Output
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SpesaFacile-v1.0.0.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpesaFacile-APK
        path: app/build/outputs/apk/debug/SpesaFacile-v1.0.0.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0
        name: SpesaFacile v1.0.0
        body: |
          Rilascio ufficiale di **SpesaFacile v1.0.0**.
          
          ### Funzionalità incluse:
          - Gestione di liste della spesa multiple.
          - Inserimento rapido dei prodotti con suggerimenti intelligenti.
          - Suddivisione automatica e raggruppamento per categorie.
          - Regolazione quantità e unità di misura.
          - Widget interattivo per la Home Screen (Jetpack Glance).
          - Palette colori arancione e ambra basata sul logo ufficiale.
          
          Scarica il file `SpesaFacile-v1.0.0.apk` qui sotto per installare l'applicazione sul tuo dispositivo Android.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/SpesaFacile-v1.0.0.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
